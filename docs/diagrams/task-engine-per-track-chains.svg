<svg xmlns="http://www.w3.org/2000/svg" width="680" height="540" viewBox="0 0 680 540" role="img">
<title>שרשראות המשימות של מנוע המשימות לפי מסלול תביעה</title>
<desc>טריגר משותף (הגשה/סיווג) מזין משימת השלמת מסמכים לכל המסלולים, ואז שלוש שרשראות נפרדות: פוליסת הלקוח, צד ג' דוח פרטי, וצד ג' הסדר. כל תיבה היא משימה עם מועד יעד; טורקיז=פעולה, ענבר=מעקב.</desc>
<style>
  text{font-family:'Segoe UI',Arial,sans-serif}
  .th{font-weight:500;font-size:14px}
  .ts{font-weight:400;font-size:12px}
  .arr{stroke:#888780;stroke-width:1.5;fill:none}
  rect{stroke-width:1}
  .c-gray rect{fill:#F1EFE8;stroke:#5F5E5A}.c-gray .th{fill:#2C2C2A}.c-gray .ts{fill:#5F5E5A}
  .c-teal rect{fill:#E1F5EE;stroke:#0F6E56}.c-teal .th{fill:#04342C}.c-teal .ts{fill:#0F6E56}
  .c-amber rect{fill:#FAEEDA;stroke:#854F0B}.c-amber .th{fill:#412402}.c-amber .ts{fill:#854F0B}
  .lg{font-weight:400;font-size:12px;fill:#5F5E5A}
</style>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>

<g style="direction:rtl">
<line class="arr" x1="340" y1="83" x2="340" y2="93" marker-end="url(#arrow)"/>
<line class="arr" x1="340" y1="135" x2="340" y2="148" marker-end="url(#arrow)"/>
<line class="arr" x1="320" y1="137" x2="150" y2="149" marker-end="url(#arrow)"/>
<line class="arr" x1="360" y1="137" x2="530" y2="149" marker-end="url(#arrow)"/>

<line class="arr" x1="130" y1="180" x2="130" y2="193" marker-end="url(#arrow)"/>
<line class="arr" x1="130" y1="235" x2="130" y2="255" marker-end="url(#arrow)"/>
<line class="arr" x1="130" y1="297" x2="130" y2="317" marker-end="url(#arrow)"/>

<line class="arr" x1="340" y1="180" x2="340" y2="193" marker-end="url(#arrow)"/>
<line class="arr" x1="340" y1="235" x2="340" y2="255" marker-end="url(#arrow)"/>
<line class="arr" x1="340" y1="297" x2="340" y2="317" marker-end="url(#arrow)"/>
<line class="arr" x1="340" y1="359" x2="340" y2="379" marker-end="url(#arrow)"/>
<line class="arr" x1="340" y1="421" x2="340" y2="441" marker-end="url(#arrow)"/>

<line class="arr" x1="550" y1="180" x2="550" y2="193" marker-end="url(#arrow)"/>
<line class="arr" x1="550" y1="235" x2="550" y2="255" marker-end="url(#arrow)"/>
<line class="arr" x1="550" y1="297" x2="550" y2="317" marker-end="url(#arrow)"/>
<line class="arr" x1="550" y1="359" x2="550" y2="379" marker-end="url(#arrow)"/>

<g class="c-gray"><rect x="250" y="45" width="180" height="38" rx="4"/><text class="th" x="340" y="64" text-anchor="middle">הגשה · סיווג מסלול</text><text class="ts" x="340" y="78" text-anchor="middle">טריגר לכל המסלולים</text></g>
<g class="c-teal"><rect x="250" y="95" width="180" height="40" rx="4"/><text class="th" x="340" y="116" text-anchor="middle">השלמת מסמכים חסרים</text><text class="ts" x="340" y="130" text-anchor="middle">עד 3 ימים</text></g>

<g class="c-gray"><rect x="48" y="150" width="164" height="30" rx="4"/><text class="th" x="130" y="169" text-anchor="middle">פוליסת הלקוח</text></g>
<g class="c-gray"><rect x="258" y="150" width="164" height="30" rx="4"/><text class="th" x="340" y="169" text-anchor="middle">צד ג' — דוח פרטי</text></g>
<g class="c-gray"><rect x="468" y="150" width="164" height="30" rx="4"/><text class="th" x="550" y="169" text-anchor="middle">צד ג' — הסדר</text></g>

<g class="c-teal"><rect x="48" y="195" width="164" height="40" rx="4"/><text class="th" x="130" y="216" text-anchor="middle">פתיחת תביעה</text><text class="ts" x="130" y="230" text-anchor="middle">עד 2 ימים</text></g>
<g class="c-teal"><rect x="48" y="257" width="164" height="40" rx="4"/><text class="th" x="130" y="278" text-anchor="middle">תיאום שמאי</text><text class="ts" x="130" y="292" text-anchor="middle">עד 3 ימים</text></g>
<g class="c-amber"><rect x="48" y="319" width="164" height="40" rx="4"/><text class="th" x="130" y="340" text-anchor="middle">מעקב מבטח</text><text class="ts" x="130" y="354" text-anchor="middle">עד 14 יום</text></g>

<g class="c-teal"><rect x="258" y="195" width="164" height="40" rx="4"/><text class="th" x="340" y="216" text-anchor="middle">פרטי מבטח צד ג'</text><text class="ts" x="340" y="230" text-anchor="middle">עד 2 ימים</text></g>
<g class="c-teal"><rect x="258" y="257" width="164" height="40" rx="4"/><text class="th" x="340" y="278" text-anchor="middle">תיאום שמאי</text><text class="ts" x="340" y="292" text-anchor="middle">עד 3 ימים</text></g>
<g class="c-teal"><rect x="258" y="319" width="164" height="40" rx="4"/><text class="th" x="340" y="340" text-anchor="middle">איסוף דוח פרטי</text><text class="ts" x="340" y="354" text-anchor="middle">עד 5 ימים</text></g>
<g class="c-teal"><rect x="258" y="381" width="164" height="40" rx="4"/><text class="th" x="340" y="402" text-anchor="middle">הגשה לצד ג'</text><text class="ts" x="340" y="416" text-anchor="middle">עד 2 ימים</text></g>
<g class="c-amber"><rect x="258" y="443" width="164" height="40" rx="4"/><text class="th" x="340" y="464" text-anchor="middle">מעקב צד ג'</text><text class="ts" x="340" y="478" text-anchor="middle">עד 14 יום</text></g>

<g class="c-teal"><rect x="468" y="195" width="164" height="40" rx="4"/><text class="th" x="550" y="216" text-anchor="middle">בקשת הסדר</text><text class="ts" x="550" y="230" text-anchor="middle">עד 2 ימים</text></g>
<g class="c-amber"><rect x="468" y="257" width="164" height="40" rx="4"/><text class="th" x="550" y="278" text-anchor="middle">מעקב אישור</text><text class="ts" x="550" y="292" text-anchor="middle">עד 5 ימים</text></g>
<g class="c-teal"><rect x="468" y="319" width="164" height="40" rx="4"/><text class="th" x="550" y="340" text-anchor="middle">תיאום מוסך</text><text class="ts" x="550" y="354" text-anchor="middle">עד 3 ימים</text></g>
<g class="c-amber"><rect x="468" y="381" width="164" height="40" rx="4"/><text class="th" x="550" y="402" text-anchor="middle">מעקב תיקון</text><text class="ts" x="550" y="416" text-anchor="middle">עד 7 ימים</text></g>
</g>

<g class="c-teal"><rect x="238" y="503" width="13" height="13" rx="3"/></g>
<text class="lg" x="258" y="513" text-anchor="start">פעולה</text>
<g class="c-amber"><rect x="360" y="503" width="13" height="13" rx="3"/></g>
<text class="lg" x="380" y="513" text-anchor="start">מעקב</text>
</svg>
