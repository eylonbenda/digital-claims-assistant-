name: ci

# Gates every PR on the three checks the app already defines in web/package.json:
# lint (eslint), test (vitest), and a production build (next build). Keeps broken
# code from merging to main. Runs only when app code changes — docs-only PRs skip.
on:
  pull_request:
    paths:
      - 'web/**'
      - '.github/workflows/ci.yml'
  push:
    branches: [main]
    paths:
      - 'web/**'

# Cancel superseded runs on the same ref (e.g. rapid pushes to a PR branch).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
